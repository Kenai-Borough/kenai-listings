<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" />
    <meta
      name="description"
      content="Kenai Listings is the fast local classifieds hub for buying, selling, hiring, and finding services across the Kenai Peninsula."
    />
    <meta property="og:title" content="Kenai Listings | Local Classifieds for the Kenai Peninsula" />
    <meta
      property="og:description"
      content="Browse jobs, housing, gear, free stuff, contractor services, and community posts built for Kenai life."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kenailistings.com" />
    <script>
      (() => {
        const stored = localStorage.getItem('kenai-listings-theme');
        const isDark = stored ? stored === 'dark' : true;
        document.documentElement.classList.toggle('dark', isDark);
      })();
    </script>
    <title>Kenai Listings | Kenai Peninsula Classifieds</title>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
